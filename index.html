<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beatnyk — index</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #e0e0e0;
            --sub: #777;
            --border: #333;
        }

        body.light-mode {
            --bg: #f4f4f0;
            --fg: #111111;
            --sub: #555;
            --border: #ccc;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            width: 90%; 
            max-width: 1400px; 
            margin: 0 auto;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 600px) {
            .container { padding: 4rem 0; }
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 1.5rem;
        }

        .header-top {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 2rem;
        }
        
        @media (min-width: 600px) {
            .header-top {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
            }
        }

        .header-titles { margin-bottom: 1rem; }
        @media (min-width: 600px) { .header-titles { margin-bottom: 0; } }

        h1 { font-size: 2.5rem; font-weight: bold; margin-bottom: 0.2rem; letter-spacing: -1px; }
        .subtitle { font-size: 1rem; color: var(--sub); text-transform: lowercase; }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        h2 { font-size: 1.2rem; font-weight: bold; text-transform: lowercase; color: var(--sub); }
        
        a, button.header-btn, span.toggle-btn {
            color: var(--fg);
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            font-size: inherit;
        }
        
        a { border-bottom: 1px solid var(--fg); }
        a:hover, button.header-btn:hover, span.toggle-btn:hover, footer a:hover { background: var(--fg); color: var(--bg); }

        .header-btn {
            font-size: 0.85rem;
            border: 1px solid var(--border);
            padding: 0.2rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        a.header-btn:hover { border-color: var(--fg); }

        .about-text {
            font-size: 1rem;
            white-space: pre-wrap;
            color: var(--sub);
            max-width: 1000px; 
        }

        main { flex-grow: 1; }
        
        section { margin-bottom: 4rem; }

        .section-content { display: none; }
        .section-content.active { display: block; }

        .item { margin-bottom: 2rem; }
        
        .item-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 0.25rem;
        }

        @media (min-width: 600px) {
            .item-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: baseline;
            }
        }

        .item-title { font-size: 1.1rem; font-weight: bold; }
        .item-meta { font-size: 0.9rem; color: var(--sub); margin-top: 0.2rem; }
        
        @media (min-width: 600px) {
            .item-meta { margin-top: 0; text-align: right; }
        }

        .item-short-desc { font-size: 0.95rem; margin-top: 0.25rem; max-width: 1100px; }
        
        .toggle-btn {
            font-size: 0.85rem;
            color: var(--sub);
            margin-top: 0.5rem;
            display: inline-block;
        }

        .item-full-desc {
            display: none;
            margin-top: 1rem;
            padding-left: 1rem;
            border-left: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--sub);
            max-width: 1100px;
        }

        .item-full-desc.active { display: block; }
        .item-full-desc p { margin-bottom: 0.75rem; }
        .item-full-desc a { border-bottom: 1px dotted var(--sub); }

        .sys-msg { color: #ff3333; font-size: 0.85rem; }

        footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--border);
            font-size: 0.9rem;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @media (min-width: 600px) {
            .footer-content {
                flex-direction: row;
                justify-content: space-between;
                align-items: baseline;
            }
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-titles">
                    <h1>beatnyk</h1>
                    <p class="subtitle">sound designer / computer musician / noise artist</p>
                </div>
                <div class="header-actions">
                    <a href="https://drive.google.com/file/d/124kzdTUTpUBHeZSzpafFI2jsH_EelffT/view?usp=sharing" target="_blank" class="header-btn" rel="noopener noreferrer">[ cv ]</a>
                    <button class="header-btn" onclick="toggleTheme()" id="theme-btn">[ light mode ]</button>
                </div>
            </div>
            <div id="about-container" class="about-text">loading sys_data...</div>
        </header>
        
        <main>
            <section>
                <div class="section-header">
                    <h2>work_</h2>
                    <span class="toggle-btn" onclick="toggleSection('work-container', this)">[+] expand</span>
                </div>
                <div id="work-container" class="section-content"></div>
            </section>
            
            <section>
                <div class="section-header">
                    <h2>lab_</h2>
                    <span class="toggle-btn" onclick="toggleSection('lab-container', this)">[+] expand</span>
                </div>
                <div id="lab-container" class="section-content"></div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <span style="color: var(--sub);">contact_</span>
                <div class="footer-links">
                    <a href="mailto:beatnyk@proton.me">beatnyk@proton.me</a>
                    <a href="https://instagram.com/beatnyk" target="_blank" rel="noopener noreferrer">ig: @beatnyk</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                btn.textContent = '[ dark mode ]';
            } else {
                btn.textContent = '[ light mode ]';
            }
        }

        function toggleSection(id, btn) {
            const content = document.getElementById(id);
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                btn.textContent = '[+] expand';
            } else {
                content.classList.add('active');
                btn.textContent = '[-] close';
            }
        }

        function toggleDesc(id) {
            const desc = document.getElementById('desc-' + id);
            const btn = document.getElementById('btn-' + id);
            
            if (desc.classList.contains('active')) {
                desc.classList.remove('active');
                btn.textContent = '[+] read more';
            } else {
                desc.classList.add('active');
                btn.textContent = '[-] close';
            }
        }

        fetch('data.json')
            .then(response => {
                if (!response.ok) throw new Error('ERR_FILE_NOT_FOUND');
                return response.json();
            })
            .then(data => {
                document.getElementById('about-container').textContent = data.about || 'No about data found.';

                // Helper function to extract a sortable numerical value from the year string
                const getSortValue = (yearStr) => {
                    if (!yearStr) return 0;
                    const lowerStr = String(yearStr).toLowerCase();
                    
                    // Prioritize "ongoing" items at the absolute top
                    if (lowerStr.includes('ongoing') || lowerStr.includes('present')) return 9999;
                    
                    // Extract all 4-digit numbers (e.g., handles "2021-2023" by grabbing 2021 and 2023)
                    const matches = String(yearStr).match(/\d{4}/g);
                    if (matches) {
                        // Return the highest year found so ranges sort by their completion date
                        return Math.max(...matches.map(Number));
                    }
                    return 0;
                };

                const renderItems = (items, prefix) => {
                    // Create a sorted copy of the array (newest to oldest)
                    const sortedItems = (items || []).slice().sort((a, b) => {
                        return getSortValue(b.year) - getSortValue(a.year);
                    });

                    return sortedItems.map((item, index) => {
                        const uniqueId = `${prefix}-${index}`;
                        const hasFullDesc = item.fullDesc && item.fullDesc.trim() !== "";
                        
                        return `
                            <div class="item">
                                <div class="item-header">
                                    <span class="item-title">
                                        ${item.link ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>` : item.title}
                                    </span>
                                    <span class="item-meta">${item.year} // ${item.org}</span>
                                </div>
                                <div class="item-short-desc">${item.shortDesc || ''}</div>
                                
                                ${hasFullDesc ? `
                                    <span class="toggle-btn" id="btn-${uniqueId}" onclick="toggleDesc('${uniqueId}')">[+] read more</span>
                                    <div class="item-full-desc" id="desc-${uniqueId}">${item.fullDesc}</div>
                                ` : ''}
                            </div>
                        `;
                    }).join('');
                };

                document.getElementById('work-container').innerHTML = renderItems(data.work, 'work');
                document.getElementById('lab-container').innerHTML = renderItems(data.lab, 'lab');
            })
            .catch(error => {
                document.getElementById('about-container').innerHTML = `<span class="sys-msg">fatal error: could not load data.json. Ensure files are served via a local web server, not directly from the file system.</span>`;
            });
    </script>
</body>
</html>
